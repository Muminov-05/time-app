
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таймер Style Redmi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="title">
        <span class="clock">🕐</span> Таймер
    </h1>

    <div class="circle-timer">
        <svg viewbox="0 0 220 220">
            <circle cx="110" cy="110" r="105" class="timer-bg"></circle>
            <circle cx="110" cy="110" r="105" class="timer-progress" id="progressCircle"></circle>
        </svg>
        <div class="dot-handle" id="dotHandle"></div>
        
        <div id="display">00:00:00</div>
    </div>

    <div class="picker">
        <div class="col">
            <div class="label">Часы</div>
            <div class="wheel" id="hours"></div>
        </div>

        <div class="col">
            <div class="label">Мин</div>
            <div class="wheel" id="minutes"></div>
        </div>

        <div class="col">
            <div class="label">Сек</div>
            <div class="wheel" id="seconds"></div>
        </div>
    </div>

    <div class="melody-row">
        <div class="melody-label">Мелодия</div>
        <div class="wheel melody" id="melody"></div>
        <button id="addMelodyBtn" class="add-melody-inline">+</button>
        <input type="file" id="fileInput" accept="audio/*" style="display: none;">
    </div>

    <button id="mainBtn">Старт</button>

</div>

<script src="main.js"></script>
</body>
</html>
